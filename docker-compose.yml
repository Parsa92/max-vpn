services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: maxvpn
      POSTGRES_PASSWORD: center1990
      POSTGRES_DB: maxvpn_db
    network_mode: host
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maxvpn -h 127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    network_mode: host
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "127.0.0.1", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: max-vpn-api
    network_mode: host
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./config.json:/app/config.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  sales-bot:
    image: max-vpn-bot
    network_mode: host
    command: python -m sales_bot.main
    volumes:
      - ./config.json:/app/config.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  userbot-worker:
    image: max-vpn-worker
    network_mode: host
    command: arq userbot.worker.ArqSettings
    volumes:
      - ./config.json:/app/config.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    network_mode: host
    volumes:
      - ./config.json:/app/config.json:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl_setup.sh:/ssl_setup.sh:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    entrypoint: ["/bin/sh", "/ssl_setup.sh"]
    depends_on:
      - api
      - sales-bot
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  certbot_conf:
  certbot_www:
