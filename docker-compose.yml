services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: maxvpn
      POSTGRES_PASSWORD: maxvpn_pass
      POSTGRES_DB: maxvpn_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maxvpn"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./config.json:/app/config.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  sales-bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    command: python -m sales_bot.main
    volumes:
      - ./config.json:/app/config.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  userbot-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: arq userbot.worker.ArqSettings
    volumes:
      - ./config.json:/app/config.json:ro
      - pyrogram_sessions:/app/sessions
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl_setup.sh:/ssl_setup.sh:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    entrypoint: ["/bin/sh", "/ssl_setup.sh"]
    depends_on:
      - api
      - sales-bot
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    profiles:
      - production
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - nginx

volumes:
  postgres_data:
  redis_data:
  certbot_conf:
  certbot_www:
  pyrogram_sessions:
